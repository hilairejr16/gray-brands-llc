<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Bonafide Lyfe">
  <title>Bonafide Lyfe</title>
  <!-- Charcoal rounded square background -->
  <rect width="200" height="200" rx="24" fill="#1A1A1A"/>
  <!-- Inner rose gold accent border -->
  <rect x="7" y="7" width="186" height="186" rx="19" fill="none" stroke="#C4956A" stroke-width="1.5" opacity="0.35"/>
  <!-- BL monogram — B white, L rose gold -->
  <text x="100" y="136"
        text-anchor="middle"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-weight="700"
        font-size="88">
    <tspan fill="#FFFFFF">B</tspan><tspan fill="#C4956A">L</tspan>
  </text>
  <!-- Micro brand label -->
  <text x="100" y="168"
        text-anchor="middle"
        font-family="'Inter', Arial, Helvetica, sans-serif"
        font-weight="600"
        font-size="11"
        fill="rgba(255,255,255,0.55)"
        letter-spacing="0.13em">BONAFIDE LYFE</text>
</svg>
