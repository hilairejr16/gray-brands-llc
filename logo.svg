<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 52" role="img" aria-label="Bonafide Lyfe">
  <title>Bonafide Lyfe</title>
  <!-- Option 1: Elegant — italic serif "Bonafide" + bold rose gold "Lyfe" -->
  <text x="2" y="40"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="36">
    <tspan font-weight="400" font-style="italic" fill="#1A1A1A">Bonafide</tspan><tspan font-weight="700" fill="#C4956A"> Lyfe</tspan>
  </text>
  <!-- Subtle rose gold dot accent -->
  <circle cx="192" cy="46" r="2.5" fill="#C4956A" opacity="0.5"/>
</svg>
