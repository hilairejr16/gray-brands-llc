  <text x="2" y="40"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="38"
        letter-spacing="-0.5">
    <tspan font-weight="700" fill="#1A1A1A">Gray </tspan><tspan font-weight="600" fill="#C4956A">Brands</tspan>
